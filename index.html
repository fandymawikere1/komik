<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komikcast Modern Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-modal.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-text">KOMIKCAST<span class="logo-accent">.APP</span></span>
        </div>
        <div class="nav-links">
            <a href="#" class="active" id="nav-home">
                <i class="fa-solid fa-house nav-icon"></i>
                <span class="nav-text">Home</span>
            </a>
            <a href="#" id="nav-manga">
                <span class="nav-icon">🇯🇵</span>
                <span class="nav-text">Manga</span>
            </a>
            <a href="#" id="nav-manhwa">
                <span class="nav-icon">🇰🇷</span>
                <span class="nav-text">Manhwa</span>
            </a>
            <a href="#" id="nav-manhua">
                <span class="nav-icon">🇨🇳</span>
                <span class="nav-text">Manhua</span>
            </a>
            <a href="#" id="nav-webtoon">
                <span class="nav-icon">📱</span>
                <span class="nav-text">Webtoon</span>
            </a>
            <a href="#" id="nav-bookmark">
                <i class="fa-solid fa-bookmark nav-icon"></i>
                <span class="nav-text">Save</span>
            </a>
        </div>
    </nav>

    <div class="mobile-status-filler">
        <span class="filler-text">KOMIKCAST<span class="logo-accent">.APP</span></span>
    </div>
    <div class="search-container-top">
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="search-input" placeholder="Search your favorite manga...">
        </div>
    </div>

    <div class="filter-section" id="filter-section">
        <div class="filter-bar">
            <!-- Reuse selectors -->
            <select id="filter-status">
                <option value="">Status: All</option>
                <option value="ongoing">Ongoing</option>
                <option value="completed">Completed</option>
                <option value="hiatus">Hiatus</option>
                <option value="cancelled">Cancelled</option>
            </select>
            <select id="filter-sort">
                <option value="latest">Sort: Latest</option>
                <option value="popularity">Popularity</option>
                <option value="rating">Rating</option>
            </select>
            <select id="filter-order">
                <option value="desc">Order: Desc</option>
                <option value="asc">Asc</option>
            </select>
            <select id="filter-genres">
                <option value="">Genre: All</option>
            </select>
        </div>
    </div>

    <!-- Floating Filter Button for Mobile -->
    <button class="filter-fab" id="filter-fab">
        <i class="fa-solid fa-filter"></i>
    </button>

    <!-- Mobile Filter Modal -->
    <div class="modal-overlay" id="filter-modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Filters</h3>
                <button class="close-modal" id="close-filter-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-filter-group">
                    <label>Status</label>
                    <div class="filter-chips" id="chips-status">
                        <button class="chip active" data-value="">All</button>
                        <button class="chip" data-value="ongoing">Ongoing</button>
                        <button class="chip" data-value="completed">Completed</button>
                        <button class="chip" data-value="hiatus">Hiatus</button>
                        <button class="chip" data-value="cancelled">Cancelled</button>
                    </div>
                </div>
                <div class="modal-filter-group">
                    <label>Sort By</label>
                    <div class="filter-chips" id="chips-sort">
                        <button class="chip active" data-value="latest">Latest</button>
                        <button class="chip" data-value="popularity">Popularity</button>
                        <button class="chip" data-value="rating">Rating</button>
                    </div>
                </div>
                <div class="modal-filter-group">
                    <label>Order</label>
                    <div class="filter-chips" id="chips-order">
                        <button class="chip active" data-value="desc">Desc</button>
                        <button class="chip" data-value="asc">Asc</button>
                    </div>
                </div>
                <div class="modal-filter-group">
                    <label>Genres</label>
                    <div class="genre-grid-modal" id="modal-genre-grid">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="apply-filters-btn" id="modal-apply-filters">Apply Filters</button>
            </div>
        </div>
    </div>

    <main class="container">
        <!-- Banner Section -->
        <section class="banner-section">
            <h2 class="section-title">Trending Now</h2>
            <div class="carousel-container" id="banner-carousel">
                <div class="carousel-track" id="banner-track">
                    <!-- Banner Items injected via JS -->
                    <div class="loading-state">Loading trending series...</div>
                </div>
                <button class="carousel-btn prev-btn" id="prevBtn">&lt;</button>
                <button class="carousel-btn next-btn" id="nextBtn">&gt;</button>
            </div>
            <div class="carousel-indicators" id="banner-indicators"></div>
        </section>
        
        <!-- Latest Releases Section -->
        <section class="latest-section">
            <h2 class="section-title">Latest Releases</h2>
            <div class="grid-container" id="latest-grid">
                <!-- Latest Items injected via JS -->
                <div class="loading-state">Loading latest releases...</div>
            </div>
        </section>

    </main>
    <script src="cap-handler.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
