name: Build Android & Windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Files (www)
        run: |
          mkdir www
          cp *.html www/
          cp *.js www/
          cp *.css www/
          # Copy images if they exist
          [ -d img ] && cp -r img www/ || true
          [ -d assets ] && cp -r assets www/ || true

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Komikcast Reader" "com.abahcode.komikcast" --web-dir "www"
          npx cap add android

      - name: Inject Android Network Security & Permissions
        run: |
          # Create xml directory
          mkdir -p android/app/src/main/res/xml
          # Copy our custom security config
          cp android-config/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml
          
          # Inject networkSecurityConfig into AndroidManifest.xml
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config" android:usesCleartextTraffic="true"/' android/app/src/main/res/AndroidManifest.xml
          
          # Ensure INTERNET permission exists
          if ! grep -q "android.permission.INTERNET" android/app/src/main/res/AndroidManifest.xml; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/res/AndroidManifest.xml
          fi

      - name: Build Android App (Debug APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Komikcast-Reader-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Windows Executable
        run: npm run build:win

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Komikcast-Reader-Windows
          path: dist/*.exe
